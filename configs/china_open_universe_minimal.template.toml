[project]
name = "etf-forecasting"
profile = "china_open_universe_minimal"

[data]
source = "yfinance"
start_date = "2015-01-01"
end_date = "2025-12-31"

# Minimal representative China ETF core universe for pooled training.
universe_core = ["510050.SS", "510300.SS", "510500.SS", "159915.SZ"]

# Optional extension with shorter history, useful for innovation/STAR exposure.
universe_optional = ["588000.SS"]

# Cross-market context features (lagged and timezone-aligned to China decision time).
cross_market_features = ["SPY", "QQQ", "IEUR"]

[target]
definition = "open_to_prev_close_log_return"
horizon = 1

[open_universe]
enabled = true
min_history_rows = 60
required_base_columns = ["date", "symbol", "open", "high", "low", "close", "volume"]
