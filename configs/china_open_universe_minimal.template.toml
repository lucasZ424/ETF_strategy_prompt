[project]
name = "etf-forecasting"
profile = "china_open_universe_minimal"
timezone = "Asia/Shanghai"
seed = 42

[data]
source = "yfinance"
start_date = "2015-01-01"
end_date = "2025-12-31"

# Expanded China ETF core universe for pooled training (12 ETFs).
universe_core = [
    "510050.SS", "510300.SS", "510500.SS", "510880.SS", "588000.SS",
    "159915.SZ", "513130.SS", "512690.SS", "512170.SS", "512480.SS",
    "516160.SS", "518880.SS",
]
universe_optional = []
unseen_etfs = ["512880.SS", "159919.SZ"]

# Cross-market context features (lagged and timezone-aligned to China decision time).
cross_market_features = ["SPY", "QQQ", "IEUR"]
global_risk = ["VIX", "TNX", "DXY"]

[features]
lookback_windows = [5, 10, 20]

[features.selection]
# Stage A: Pearson correlation filter threshold
correlation_threshold = 0.9
# Stage B: XGBoost importance — keep top-k after correlation filter (null = keep all)
importance_top_k = 6
# Features protected from correlation filter (cross-market, macro, cross-sectional)
protected_prefixes = []

[barrier]
# Triple-barrier ternary gate labels (10-day horizon)
horizon = 10
upper_multiplier = 1.0
lower_multiplier = 1.0
vol_lookback = 20
# AFML-consistent default uses daily target volatility.
# Set to "sqrt_horizon" to recover legacy scaling behavior.
target_scaling = "daily"

[gate]
# Gate feature parameters
cost_threshold = 0.0016   # round-trip cost in log-return terms (fee + slippage, both sides)
gap_threshold = 0.005     # abs gap threshold for gap_freq_10

[target.dashboard]
# Multi-horizon raw close-price forecasts for investor dashboard
horizons = [1, 3, 5]

[model]
train_ratio = 0.70
val_ratio = 0.15
test_ratio = 0.15
optuna_trials = 100
optuna_pruning = true
optuna_pruner_startup_trials = 10
optuna_pruner_warmup_steps = 50
early_stopping_patience = 10
model_dir = "models"
output_dir = "outputs"

[backtest]
initial_cash = 1000000.0
fee_bps = 5.0
slippage_bps = 3.0
max_gross_leverage = 1.0
risk_free_rate = 0.0179

[open_universe]
enabled = true
min_history_rows = 60
required_base_columns = ["date", "symbol", "open", "high", "low", "close", "adj_close", "volume"]
